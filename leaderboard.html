<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - LMS TKA SD</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="anbk-theme">
    <!-- ANBK Header -->
    <header class="anbk-header">
        <div class="flex items-center gap-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Logo_of_Ministry_of_Education_and_Culture_of_Republic_of_Indonesia.svg/1200px-Logo_of_Ministry_of_Education_and_Culture_of_Republic_of_Indonesia.svg.png" class="h-10 w-auto" alt="Logo">
            <div>
                <h1 class="text-sm font-bold leading-tight">LMS TKA SD</h1>
                <p class="text-[10px] opacity-80 uppercase tracking-widest">TAHUN 2026</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <a href="dashboard.html" class="text-xs font-bold bg-white/20 px-4 py-2 rounded hover:bg-white/30 transition-all flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> KEMBALI
            </a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 pt-12 pb-20">
        <div class="text-center mb-16 fade-in">
            <div class="w-20 h-20 bg-anbk-blue/10 text-anbk-blue rounded-3xl flex items-center justify-center text-4xl mx-auto mb-6">
                <i class="fas fa-trophy"></i>
            </div>
            <h1 class="text-4xl font-bold mb-4 text-slate-800">Leaderboard Global</h1>
            <p class="text-slate-500">Peringkat siswa terbaik berdasarkan skor latihan TKA SD.</p>
        </div>

        <div class="anbk-card overflow-hidden fade-in" style="animation-delay: 0.1s">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-slate-100 bg-slate-50">
                            <th class="px-8 py-5 font-bold text-xs uppercase tracking-wider text-slate-400">Rank</th>
                            <th class="px-8 py-5 font-bold text-xs uppercase tracking-wider text-slate-400">Siswa</th>
                            <th class="px-8 py-5 font-bold text-xs uppercase tracking-wider text-slate-400">Pencapaian</th>
                            <th class="px-8 py-5 font-bold text-xs uppercase tracking-wider text-slate-400 text-right">Skor Tertinggi</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        <!-- Rows will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div id="emptyState" class="hidden text-center py-20">
            <i class="fas fa-users text-5xl text-slate-200 mb-4"></i>
            <p class="text-slate-400">Belum ada data peringkat saat ini.</p>
        </div>
    </main>

    <script type="module" src="/js/app.js"></script>
    <script type="module">
        async function initLeaderboard() {
            const body = document.getElementById('leaderboardBody');
            const empty = document.getElementById('emptyState');
            
            // Show loading state
            body.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-slate-400">Memuat data...</td></tr>';
            
            const data = await window.App.getLeaderboard();

            if (data.length === 0) {
                body.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            body.innerHTML = '';
            data.forEach((user, i) => {
                const score = user.score || 0;
                const badge = window.App.getBadge(score);
                const isTop3 = i < 3;
                const rankColor = i === 0 ? 'text-amber-500' : i === 1 ? 'text-slate-400' : i === 2 ? 'text-amber-700' : 'text-slate-400';
                
                const row = document.createElement('tr');
                row.className = `border-b border-slate-50 hover:bg-slate-50 transition-colors ${i === 0 ? 'bg-blue-50/30' : ''}`;
                row.innerHTML = `
                    <td class="px-8 py-6">
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-xl ${rankColor}">${i + 1}</span>
                            ${isTop3 ? '<i class="fas fa-crown ' + rankColor + '"></i>' : ''}
                        </div>
                    </td>
                    <td class="px-8 py-6">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-sm text-slate-500">
                                ${user.username[0].toUpperCase()}
                            </div>
                            <span class="font-bold text-slate-700">${user.username}</span>
                        </div>
                    </td>
                    <td class="px-8 py-6">
                        <span class="badge ${badge.class}">${badge.name}</span>
                    </td>
                    <td class="px-8 py-6 text-right">
                        <span class="text-xl font-bold text-anbk-blue">${score}</span>
                    </td>
                `;
                body.appendChild(row);
            });
        }

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initLeaderboard);
        } else {
            initLeaderboard();
        }
    </script>
</body>
</html>
