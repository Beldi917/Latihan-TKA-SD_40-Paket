<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - LMS TKA SD</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="anbk-theme p-10">
    <div class="max-w-2xl mx-auto space-y-8">
        <div class="anbk-card p-8">
            <h1 class="text-2xl font-bold mb-6">Generate Token Aktivasi</h1>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-400 uppercase mb-2">Token Baru</label>
                    <div class="flex gap-2">
                        <input type="text" id="newToken" class="anbk-input font-mono uppercase flex-1" placeholder="TKA-XXXXX-XXXXX">
                        <button id="randomBtn" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition-all">
                            <i class="fas fa-random"></i>
                        </button>
                    </div>
                </div>
                <button id="generateBtn" class="w-full py-3 bg-anbk-btn text-white rounded-lg font-bold">Simpan ke Firestore</button>
                <p id="status" class="text-sm mt-4 hidden"></p>
            </div>
        </div>

        <div class="anbk-card p-8">
            <h1 class="text-2xl font-bold mb-6">Bulk Import Token</h1>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-400 uppercase mb-2">Daftar Token (Pisahkan dengan spasi/koma/baris baru)</label>
                    <textarea id="bulkTokens" class="anbk-input font-mono uppercase h-48" placeholder="TKA-XXXXX-XXXXX TKA-YYYYY-YYYYY ..."></textarea>
                </div>
                <button id="bulkBtn" class="w-full py-3 bg-emerald-500 text-white rounded-lg font-bold hover:bg-emerald-600 transition-all">Import Semua Token</button>
                <p id="bulkStatus" class="text-sm mt-4 hidden"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { generateToken, bulkAddTokens } from '/src/firebase.ts';
        
        const btn = document.getElementById('generateBtn');
        const randomBtn = document.getElementById('randomBtn');
        const input = document.getElementById('newToken');
        const status = document.getElementById('status');

        const bulkBtn = document.getElementById('bulkBtn');
        const bulkInput = document.getElementById('bulkTokens');
        const bulkStatus = document.getElementById('bulkStatus');

        randomBtn.onclick = () => {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let token = 'TKA-';
            for(let i=0; i<5; i++) token += chars.charAt(Math.floor(Math.random() * chars.length));
            token += '-';
            for(let i=0; i<5; i++) token += chars.charAt(Math.floor(Math.random() * chars.length));
            input.value = token;
        };

        btn.onclick = async () => {
            const token = input.value.trim();
            if (!token) return;

            btn.disabled = true;
            btn.innerText = 'Memproses...';
            status.classList.add('hidden');

            try {
                await generateToken(token);
                status.innerText = `Token ${token.toUpperCase()} berhasil dibuat!`;
                status.className = 'text-sm mt-4 text-emerald-500 font-bold';
                status.classList.remove('hidden');
                input.value = '';
            } catch (err) {
                status.innerText = 'Gagal membuat token. Pastikan Anda memiliki akses.';
                status.className = 'text-sm mt-4 text-red-500 font-bold';
                status.classList.remove('hidden');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Simpan ke Firestore';
            }
        };

        bulkBtn.onclick = async () => {
            const tokens = bulkInput.value.trim();
            if (!tokens) return;

            bulkBtn.disabled = true;
            bulkBtn.innerText = 'Memproses...';
            bulkStatus.classList.add('hidden');

            try {
                const count = await bulkAddTokens(tokens);
                bulkStatus.innerText = `${count} token berhasil diimport!`;
                bulkStatus.className = 'text-sm mt-4 text-emerald-500 font-bold';
                bulkStatus.classList.remove('hidden');
                bulkInput.value = '';
            } catch (err) {
                bulkStatus.innerText = `Gagal mengimport token: ${err.message}`;
                bulkStatus.className = 'text-sm mt-4 text-red-500 font-bold';
                bulkStatus.classList.remove('hidden');
                console.error(err);
            } finally {
                bulkBtn.disabled = false;
                bulkBtn.innerText = 'Import Semua Token';
            }
        };
    </script>
</body>
</html>
