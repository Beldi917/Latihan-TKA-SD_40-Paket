<body class="bg-anbk-bg min-h-screen flex flex-col font-sans">
    <!-- ANBK Header -->
    <header class="anbk-header">
        <div class="flex items-center gap-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Logo_of_Ministry_of_Education_and_Culture_of_Republic_of_Indonesia.svg/1200px-Logo_of_Ministry_of_Education_and_Culture_of_Republic_of_Indonesia.svg.png" class="h-10 w-auto" alt="Logo">
            <div>
                <h1 class="text-sm font-bold leading-tight">PUSMENDIK</h1>
                <p class="text-[10px] opacity-80 uppercase tracking-widest">APLIKASI ANBK</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right hidden sm:block">
                <p class="text-xs font-bold" id="headerUserInfo">P130100230 - <span id="headerUserName">Siswa</span></p>
            </div>
            <div class="w-8 h-8 bg-white/20 rounded flex items-center justify-center">
                <i class="fas fa-graduation-cap text-white"></i>
            </div>
        </div>
    </header>

    <main class="flex-1 p-4 sm:p-8 flex justify-center items-start">
        <div class="w-full max-w-3xl fade-in mt-4">
            <div class="anbk-card bg-white">
                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200">
                    <h2 class="text-lg font-bold text-slate-700">Konfirmasi data Peserta</h2>
                </div>
                
                <div class="p-6 sm:p-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12">
                        <!-- Left Column -->
                        <div class="space-y-4">
                            <div>
                                <label class="anbk-label">Kode NIK</label>
                                <span class="anbk-value" id="displayNik">32730100230001</span>
                            </div>

                            <div>
                                <label class="anbk-label">Nama Peserta</label>
                                <span class="anbk-value" id="displayName">Siswa</span>
                            </div>

                            <div>
                                <label class="anbk-label">Jenis Kelamin</label>
                                <span class="anbk-value">Laki-laki</span>
                            </div>

                            <div>
                                <label class="anbk-label">Mata Ujian</label>
                                <span class="anbk-value" id="displayExam">Latihan Soal TKA SD</span>

                        <!-- Right Column -->
                        <div class="space-y-4">

                                <input type="text" id="confirmName" class="anbk-input" placeholder="Ketik nama Anda">

                            <div>
                                <label class="anbk-label">Tanggal Lahir</label>
                                <div class="flex gap-2">
                                    <select class="anbk-input flex-1">
                                        <option>01</option><option>02</option><option>03</option><option>04</option><option>05</option>
                                        <option>06</option><option>07</option><option>08</option><option>09</option><option>10</option>
                                        <option>11</option><option>12</option><option>13</option><option>14</option><option>15</option>
                                    </select>
                                    <select class="anbk-input flex-1">
                                        <option>Januari</option><option>Februari</option><option>Maret</option>
                                        <option>April</option><option>Mei</option><option>Juni</option>
                                        <option>Juli</option><option>Agustus</option><option>September</option>
                                        <option>Oktober</option><option>November</option><option>Desember</option>
                                    </select>
                                    <select class="anbk-input flex-1">
                                        <option>2013</option><option>2014</option><option>2015</option><option>2016</option>
                                    </select>
                                </div>
                            </div>

                            <div class="pt-4">
                                <label class="anbk-label text-anbk-blue">Token</label>
                                <div class="flex flex-col gap-2">
                                    <input type="text" id="examToken" class="anbk-input font-mono text-lg tracking-widest uppercase" placeholder="TOKEN">
                                    <p class="text-[10px] text-slate-400 italic">Token: <span class="font-bold text-slate-600" id="actualToken">VBKGLT</span></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-10 flex justify-end">
                        <button id="btnSubmitData" class="btn-anbk">
                            Submit
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center">
        <p class="text-slate-400 text-[10px] uppercase tracking-widest font-bold">
            &copy; 2026 PUSMENDIK - APLIKASI ANBK
        </p>
    </footer>

    <script type="module" src="/js/app.js"></script>
    <script type="module">
        document.addEventListener('DOMContentLoaded', () => {
            const user = window.App.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('headerUserName').innerText = user.username.toUpperCase();
            document.getElementById('displayName').innerText = user.username;
            document.getElementById('confirmName').value = user.username;

            // Generate random token
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let token = '';
            for(let i=0; i<6; i++) token += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('actualToken').innerText = token;

            document.getElementById('btnSubmitData').onclick = () => {
                const inputToken = document.getElementById('examToken').value.trim().toUpperCase();
                if (inputToken === token) {
                    window.location.href = 'confirm_test.html';
                } else {
                    alert('Token tidak valid. Silakan masukkan token yang tertera.');
                }
            };
        });
    </script>

    <script type="module" src="/js/app.js"></script>
    <script type="module">
        import { validateToken } from '/js/token.js';

        let currentCategory = 'Matematika';
        let selectedPackage = 1;
        let user = null;

        async function initDashboard() {
            user = window.App.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('headerUserName').innerText = user.username.toUpperCase();
            document.getElementById('welcomeName').innerText = user.username;
            document.getElementById('formUserName').innerText = user.username;
            
            // Get score from local storage
            const scoreData = JSON.parse(localStorage.getItem(`tka_user_score_${user.username}`)) || { score: 0 };
            const bestScore = scoreData.score;
            document.getElementById('topScore').innerText = bestScore;
            
            const badge = window.App.getBadge(bestScore);
            document.getElementById('userBadge').innerText = badge.name;
            
            // Check premium status from Firebase
            const isPremium = await window.App.checkPremium(user.username);
            user.premium = isPremium;
            
            document.getElementById('accountStatus').innerText = isPremium ? 'Aktif ✨' : 'Gratis';
            document.getElementById('accountStatus').className = `text-xl font-bold ${isPremium ? 'text-amber-600' : 'text-slate-400'}`;

            renderPackages();
            refreshDisplayToken();
        }

        function renderPackages() {
            const grid = document.getElementById('packageGrid');
            if (!grid) return;
            grid.innerHTML = '';

            for (let i = 1; i <= 20; i++) {
                // Packages 1-2 are free, 3-20 are locked
                const isLocked = i > 2 && !user.premium;
                
                const card = document.createElement('div');
                card.className = `anbk-card p-6 group cursor-pointer transition-all duration-300 hover:-translate-y-1 ${isLocked ? 'opacity-60' : 'hover:shadow-lg'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-10 h-10 rounded-lg bg-slate-100 flex items-center justify-center font-bold group-hover:bg-anbk-blue group-hover:text-white transition-colors">
                            ${i}
                        </div>
                        ${isLocked ? '<i class="fas fa-lock text-amber-500"></i>' : '<i class="fas fa-play text-anbk-blue opacity-0 group-hover:opacity-100 transition-opacity"></i>'}
                    </div>
                    <h4 class="font-bold mb-1">Paket ${i}</h4>
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-4">${isLocked ? 'Premium' : 'Tersedia'}</p>
                    <div class="h-1 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-anbk-blue" style="width: 0%"></div>
                    </div>
                `;
                
                card.onclick = () => {
                    if (isLocked) {
                        showDonationModal();
                    } else {
                        selectedPackage = i;
                        showStep1();
                    }
                };
                
                grid.appendChild(card);
            }
        }

        function showDonationModal() {
            document.getElementById('donationModal').classList.remove('hidden');
        }

        function closeDonationModal() {
            document.getElementById('donationModal').classList.add('hidden');
            document.getElementById('activationError').classList.add('hidden');
            document.getElementById('activationTokenInput').value = '';
        }

        async function unlockWithToken() {
            const token = document.getElementById('activationTokenInput').value.trim();
            if (!token) return;

            const btn = document.querySelector('#donationModal button[onclick="unlockWithToken()"]');
            const originalText = btn.innerText;
            btn.innerText = 'Memproses...';
            btn.disabled = true;

            try {
                const result = await window.App.unlockPremium(user.username, token);
                if (result.success) {
                    user.premium = true;
                    await initDashboard();
                    closeDonationModal();
                    alert(result.message);
                } else {
                    let errorMsg = result.message;
                    try {
                        // Try to parse if it's a JSON error from handleFirestoreError
                        const parsed = JSON.parse(errorMsg);
                        errorMsg = parsed.error || errorMsg;
                    } catch (e) {
                        // Not JSON, use original
                    }
                    document.getElementById('activationError').innerText = errorMsg;
                    document.getElementById('activationError').classList.remove('hidden');
                }
            } catch (error) {
                let errorMsg = error.message;
                try {
                    const parsed = JSON.parse(errorMsg);
                    errorMsg = parsed.error || errorMsg;
                } catch (e) {
                    // Not JSON
                }
                document.getElementById('activationError').innerText = errorMsg;
                document.getElementById('activationError').classList.remove('hidden');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function switchTab(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-anbk-blue', 'text-white');
                btn.classList.add('bg-white', 'text-slate-500');
            });
            const activeBtn = cat === 'Matematika' ? document.getElementById('tab-Matematika') : document.getElementById('tab-Bahasa');
            if (activeBtn) {
                activeBtn.classList.add('active', 'bg-anbk-blue', 'text-white');
                activeBtn.classList.remove('bg-white', 'text-slate-500');
            }
            renderPackages();
        }

        function showStep1() {
            document.getElementById('confNamaTes').innerText = `${currentCategory} - SD Sederajat`;
            document.getElementById('confWaktuTes').innerText = new Date().toLocaleString('id-ID');
            document.getElementById('stepKonfirmasiTes').classList.remove('hidden');
        }

        function goToStep2() {
            document.getElementById('stepKonfirmasiTes').classList.add('hidden');
            document.getElementById('formMataUjian').innerText = `${currentCategory} - SD Sederajat`;
            document.getElementById('stepDataPeserta').classList.remove('hidden');
        }

        function cancelSteps() {
            document.getElementById('stepKonfirmasiTes').classList.add('hidden');
            document.getElementById('stepDataPeserta').classList.add('hidden');
        }

        function refreshDisplayToken() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let token = '';
            for(let i=0; i<6; i++) token += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('displayToken').innerText = token;
        }

        function startExam() {
            const inputToken = document.getElementById('inputToken').value.trim().toUpperCase();
            const displayToken = document.getElementById('displayToken').innerText;
            
            if (inputToken === displayToken) {
                window.location.href = `exam.html?category=${currentCategory}&package=${selectedPackage}`;
            } else {
                alert('Token sesi tidak cocok. Silakan masukkan token yang tertera di sebelah kiri.');
            }
        }

        // Expose functions to window
        window.switchTab = switchTab;
        window.showDonationModal = showDonationModal;
        window.closeDonationModal = closeDonationModal;
        window.unlockWithToken = unlockWithToken;
        window.showStep1 = showStep1;
        window.goToStep2 = goToStep2;
        window.cancelSteps = cancelSteps;
        window.refreshDisplayToken = refreshDisplayToken;
        window.startExam = startExam;

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
