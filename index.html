<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS TKA SD - Platform Belajar ANBK</title>
    <meta name="description" content="Platform latihan soal TKA SD untuk persiapan Tes Kompetensi Akademik dengan paket latihan dan sistem token akses." />
    <meta name="robots" content="index, follow">
    <meta name="google-site-verification" content="RopvrAqs1ht3qYbBJ1gwa48MWrBvNph2-0WjUISKQIU" />
    <script>
        // Force unregister all service workers to fix "broken" appearance caused by old cache
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) {
                    registration.unregister().then(() => {
                        console.log('SW unregistered');
                        // Optional: reload if a registration was found to ensure fresh load
                        if (registrations.length > 0) window.location.reload();
                    });
                }
            });
        }
    </script>
    <link rel="stylesheet" href="/css/style.css?v=1.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-anbk-bg min-h-screen flex flex-col font-sans">
    <!-- ANBK Header -->
    <header class="anbk-header">
        <div class="flex items-center gap-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Logo_of_Ministry_of_Education_and_Culture_of_Republic_of_Indonesia.svg/1200px-Logo_of_Ministry_of_Education_and_Culture_of_Republic_of_Indonesia.svg.png" class="h-10 w-auto" alt="Logo">
            <div>
                <h1 class="text-sm font-bold leading-tight">PUSMENDIK</h1>
                <p class="text-[10px] opacity-80 uppercase tracking-widest">APLIKASI ANBK</p>
            </div>
        </div>
        <div class="flex gap-4">
            <a href="login.html" class="text-xs font-bold bg-white/20 px-4 py-2 rounded hover:bg-white/30 transition-all">LOGIN</a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 pt-10 sm:pt-20 pb-20 flex flex-col items-center text-center">
        <div class="fade-in max-w-3xl">
            <h1 class="text-4xl sm:text-6xl font-bold leading-tight mb-6 text-slate-800">
                Selamat Datang di <br>
                <span class="text-anbk-blue">LMS TKA SD</span>
            </h1>
            <p class="text-slate-500 text-lg mb-10 leading-relaxed">
                Platform simulasi ujian berbasis komputer untuk persiapan Tes Kompetensi Akademik Siswa Sekolah Dasar. 
                Dapatkan pengalaman ujian yang nyata dengan standar PUSMENDIK.
            </p>
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a href="login.html" class="btn-anbk !px-10 !py-4 text-lg">Mulai Latihan</a>
            </div>
        </div>

        <div class="mt-16 w-full max-w-4xl fade-in" style="animation-delay: 0.2s">
            <div class="anbk-card p-2 bg-white shadow-2xl">
                <img src="https://raw.githubusercontent.com/Beldi917/gambar-anak-SD/2d48a9d6b5d85279395792771ead6897c441c6a6/SIBELO%20(3).png" class="w-full rounded-lg" alt="Illustration" referrerPolicy="no-referrer">
            </div>
        </div>
    </main>

    <footer class="py-12 text-center border-t border-slate-200 mt-auto bg-white">
        <p class="text-slate-400 text-xs uppercase tracking-widest font-bold">
            &copy; 2026 PUSMENDIK - APLIKASI ANBK
        </p>
    </footer>
    <script type="module" src="/js/app.js"></script>
    <script>
        // Unregister service worker if exists to fix "broken" appearance
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) {
                    registration.unregister();
                }
            });
        }
    </script>
</body>
</html>
