<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LMS TKA SD</title>
    <meta name="description" content="Platform latihan soal TKA SD untuk persiapan Tes Kompetensi Akademik dengan paket latihan dan sistem token akses." />
    <meta name="robots" content="index, follow">
    <meta name="google-site-verification" content="RopvrAqs1ht3qYbBJ1gwa48MWrBvNph2-0WjUISKQIU" />
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) registration.unregister();
            });
        }
    </script>
    <link rel="stylesheet" href="/css/style.css?v=1.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-anbk-bg min-h-screen flex flex-col font-sans">
    <!-- ANBK Header -->
    <header class="anbk-header">
        <div class="flex items-center gap-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Logo_of_Ministry_of_Education_and_Culture_of_Republic_of_Indonesia.svg/1200px-Logo_of_Ministry_of_Education_and_Culture_of_Republic_of_Indonesia.svg.png" class="h-10 w-auto" alt="Logo">
            <div>
                <h1 class="text-sm font-bold leading-tight">PUSMENDIK</h1>
                <p class="text-[10px] opacity-80 uppercase tracking-widest">APLIKASI ANBK</p>
            </div>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-md fade-in">
            <div class="anbk-card p-8 sm:p-10 bg-white">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold text-slate-800">Login Peserta</h2>
                    <p class="text-slate-500 text-sm mt-2">Silakan masukkan kredensial Anda</p>
                </div>

                <form id="loginForm" class="space-y-6">
                    <div class="space-y-1">
                        <label class="anbk-label">Username</label>
                        <input type="text" id="username" required class="anbk-input" placeholder="Username">
                    </div>

                    <div class="space-y-1">
                        <label class="anbk-label">Password</label>
                        <input type="password" id="password" required class="anbk-input" value="123456">
                        <p class="text-[10px] text-slate-400 mt-1 italic">*Password default: 123456</p>
                    </div>

                    <button type="submit" class="w-full py-3 bg-anbk-btn text-white rounded-lg font-bold hover:bg-blue-600 transition-all shadow-lg">
                        Login
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center">
        <p class="text-slate-400 text-xs uppercase tracking-widest font-bold">
            &copy; 2026 PUSMENDIK - APLIKASI ANBK
        </p>
    </footer>

    <script type="module" src="/js/app.js"></script>
    <script type="module">
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (username && password) {
                window.App.saveUser({
                    username: username,
                    school: 'SD NEGERI PERCONTOHAN',
                    joinedAt: new Date().toISOString()
                });
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
